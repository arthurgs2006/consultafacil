spring.application.name=consulta-facil

spring.datasource.url=jdbc:h2:file:./data/consulta_facil;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=false

app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars!!}
app.jwt.expiration=86400000
app.seed-demo=${SEED_DEMO:true}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
